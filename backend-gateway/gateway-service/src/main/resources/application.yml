server:
  port: 8080

spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**
        - id: repair-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/repair/**
        - id: dispatch-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/dispatch/**
        - id: review-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/review/**,/api/statistics/**

jwt:
  secret: repair-management-secret-key-2026
  expiration: 86400000
